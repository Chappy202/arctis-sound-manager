# Managed by Arctis Sound Manager — do not edit by hand.
# Per-app routing for NATIVE PipeWire clients (client.conf stream.rules);
# read by each client at ITS startup — applies to newly launched apps.
stream.rules = [
  {
    matches = [
      {
        application.process.binary = "firefox"
      }
    ]
    actions = {
      update-props = {
        target.object = "Arctis_Media"
      }
    }
  }
  {
    matches = [
      {
        application.process.binary = "Discord"
      }
    ]
    actions = {
      update-props = {
        target.object = "Arctis_Chat"
      }
    }
  }
]
