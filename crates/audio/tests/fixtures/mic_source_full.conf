context.properties = {
    default.clock.rate = 48000
    default.clock.allowed-rates = [ 48000 ]
}
context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert
    support.*       = support/libspa-support
}
context.modules = [
    {   name = libpipewire-module-rt
        flags = [ ifexists nofail ]
    }
    {   name = libpipewire-module-protocol-native }
    {   name = libpipewire-module-client-node }
    {   name = libpipewire-module-adapter }
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "Clean Mic"
            media.name       = "Clean Mic"
            filter.graph = {
                nodes = [
                    {   type = builtin  name = "mic_gain"  label = linear
                        control = { "Mult" = 1.0  "Add" = 0.0 }
                    }
                    {   type = builtin  name = "mic_highpass"  label = bq_highpass
                        control = { "Freq" = 90.0  "Q" = 0.7  "Gain" = 0.0 }
                    }
                    {   type = ladspa  name = "mic_rnnoise"  label = noise_suppressor_mono
                        plugin = "librnnoise_ladspa"
                        control = { "VAD Threshold (%)" = 40.0  "VAD Grace Period (ms)" = 800.0  "Retroactive VAD Grace (ms)" = 100.0 }
                    }
                    {   type = builtin  name = "mic_gate"  label = noisegate
                        control = { "Threshold" = 0.003  "Attack" = 5.0  "Release" = 150.0 }
                    }
                    {   type = builtin  name = "mic_eq_band_0"  label = bq_lowshelf
                        control = { "Freq" = 120.0  "Q" = 0.7  "Gain" = 3.0 }
                    }
                ]
                links = [
                    { output = "mic_gain:Out"  input = "mic_highpass:In" }
                    { output = "mic_highpass:Out"  input = "mic_rnnoise:Input" }
                    { output = "mic_rnnoise:Output"  input = "mic_gate:In" }
                    { output = "mic_gate:Out"  input = "mic_eq_band_0:In" }
                ]
                inputs  = [ "mic_gain:In" ]
                outputs = [ "mic_eq_band_0:Out" ]
            }
            audio.rate     = 48000
            audio.channels = 1
            audio.position = [ MONO ]
            capture.props = {
                node.name   = "arctis_clean_mic.capture"
                node.passive = true
                target.object = "alsa_input.hw_mic"
            }
            playback.props = {
                node.name   = "arctis_clean_mic"
                media.class = Audio/Source
            }
        }
    }
]
