name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            build-essential \
            file \
            clang \
            libpipewire-0.3-dev \
            libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # rustfmt is advisory, not a merge gate: the codebase intentionally uses a
      # dense/compact style and no rustfmt.toml can preserve it (every config
      # increases churn vs default). The check still runs so diffs are visible in
      # the logs, but it does not fail the build. Run `cargo fmt` deliberately if
      # you ever want to adopt rustfmt formatting wholesale.
      - name: rustfmt (advisory, non-blocking)
        run: cargo fmt --all -- --check
        continue-on-error: true
      # src-tauri's bundle.externalBin requires the asm-cli sidecar to exist
      # before the crate will build; stage it before clippy/test.
      - name: Stage asm-cli sidecar
        run: ./scripts/stage-sidecar.sh
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # The shipped daemon is built with `pw-watcher` (see stage-sidecar.sh), so
      # lint that code path too — default-feature clippy above only sees the stub.
      - run: cargo clippy -p arctis-cli --features pw-watcher --all-targets -- -D warnings
      # --test-threads=1: several tests mutate process-global state (ASM_CONFIG_HOME)
      # and a shared /tmp surround-conf path, which race under parallel execution.
      # Single-threaded is the project-sanctioned invocation (see CLAUDE.md).
      - run: cargo test --workspace -- --test-threads=1
