name = "Arctis Nova Pro Wireless"
vendor_id = 0x1038
product_ids = [0x12e0, 0x12e5]
interface = 4
report_id = 0x06
report_length = 64
capabilities = [
    "battery", "sidetone", "anc", "mic_volume",
    "inactive_time", "hardware_eq", "eq_preset", "chat_mix", "mic_led",
]
# Documented save/commit opcode (HeadsetControl sendCommandWithSave).
save_command = [0x09]

# ── CHATMIX DIAL-ENABLE INIT BURST ─────────────────────────────────────────
#
# Provenance: subset of `nova_pro_wireless.yaml` `device_init` from the
# reference Python app (/home/jj/Dev/Personal/sound-manager/Arctis-Sound-Manager).
# Owner-validated 2026-06-28: the owner runs the reference app in production and
# has confirmed these opcodes on real hardware (VID 0x1038, PID 0x12e5).
#
# This is the DIAL-RELEVANT subset only. The following settings-apply opcodes
# from the full reference device_init were intentionally EXCLUDED per owner
# choice (they would reset EQ/ANC/gain/sidetone/etc. to hard-coded values):
#   0x33 (EQ bands), 0xc3 (wireless), 0x2e (preset), 0xc1 (inactive-time),
#   0xb9 (transparency), 0x37 (mic-volume), 0x47 (line-out level),
#   0xbd (ANC mode), 0x27 (mic-gain), 0x39 (sidetone), 0xbf (LED strength),
#   0x43 (line-out), 0xb2/0x83/0xb3 (various settings).
#
# Without this burst the headset never enters ChatMix/dial mode and never
# emits [0x07,0x45] dial frames. The last phase of the sequence
# [0x06,0x3b,0x00] [0x06,0x8d,0x01] [0x06,0x49,0x01] is the mode-switch that
# enables the Game/Chat balance dial.
#
# Each entry is a FULL raw HID report (leading byte = report id = 0x06).
# It is padded to `report_length` (64 bytes) before being written to the device.
# These are sent ONCE on attach by `DeviceController::send_init_writes` when
# the daemon enables "chatmix_dial_init" (owner sign-off in HidOpener).
#
# No OLED writes. No save/0x09. These are transient mode-switch reports;
# a replug resets the device to default state.
#
# NOTE: This key must appear before any [table] or [[array.of.tables]] headers
# so that TOML scoping assigns it to the root DeviceDescriptor.
init_writes = [
  # ── Wake / probe group ─────────────────────────────────────────────
  [0x06, 0x20],          # wake/probe (ref: immediately after connect)
  [0x06, 0x20],          # wake/probe (repeated)
  [0x06, 0x10],          # probe
  [0x06, 0x10],          # probe (repeated)
  [0x06, 0x10],          # probe (repeated)
  [0x06, 0x3b],          # mode correction probe (ref comment: "correction")
  [0x06, 0x8d, 0x01],    # audio/Sonar mode on
  # ── Second wake group ──────────────────────────────────────────────
  [0x06, 0x20],          # wake/probe
  [0x06, 0x20],          # wake/probe
  [0x06, 0x20],          # wake/probe
  [0x06, 0x80],          # probe
  [0x06, 0x3b],          # mode correction probe
  [0x06, 0x8d, 0x01],    # audio/Sonar mode on (repeated)
  # ── Pre-enable ─────────────────────────────────────────────────────
  [0x06, 0x69, 0x00],    # pre-enable (ref: immediately before the enable group)
  # ── ChatMix mode-switch group (DIAL ENABLE) ─────────────────────────
  [0x06, 0x3b, 0x00],    # mode-switch init
  [0x06, 0x8d, 0x01],    # audio/Sonar mode on
  [0x06, 0x49, 0x01],    # CHATMIX DIAL ENABLE — puts headset into Game/Chat dial mode
  # ── Post-enable settle group ────────────────────────────────────────
  [0x06, 0xb7, 0x00],    # settle (ref: appears 3x after enable)
  [0x06, 0xb7, 0x00],    # settle
  [0x06, 0xb7, 0x00],    # settle
  [0x06, 0xb0],          # status request (prompts a status frame from the headset)
  [0x06, 0x20, 0x00],    # wake/probe with value=0x00
  [0x06, 0xb7, 0x00],    # final settle
]

[status]
# 0x06 0xb0 = status request. Writer prepends report_id, so request starts at 0xb0.
request = [0xb0]

[[status.fields]]
name = "battery_charge"
match_prefix = [0x06, 0xb0]
offset = 6
parser = { type = "percentage", min = 0, max = 8 }

[[status.fields]]
name = "mic_muted"
match_prefix = [0x06, 0xb0]
offset = 9
parser = { type = "bool", true_value = 1 }

[[status.fields]]
name = "anc_mode"
match_prefix = [0x07, 0xbd]
offset = 2
parser = { type = "enum", entries = [
    { value = 0, label = "off" },
    { value = 1, label = "transparency" },
    { value = 2, label = "on" },
] }

[[status.fields]]
name = "media_mix"
match_prefix = [0x07, 0x45]
offset = 2
parser = { type = "int" }

[[status.fields]]
name = "chat_mix"
match_prefix = [0x07, 0x45]
offset = 3
parser = { type = "int" }

# ── WRITE COMMANDS ─────────────────────────────────────────────────────────
# Each is a SINGLE opcode. No OLED. Capability-gated.
# (init_writes above handles the dial-enable burst — not a per-command write.)
# HeadsetControl-corroborated for THIS model (lib/devices/..nova_pro_wireless.hpp):

[commands.sidetone]                 # { 0x06, 0x39, 0..3 } + save
opcode = [0x39]
capability = "sidetone"
save = true
encoding = { type = "int_range", min = 0, max = 3 }

[commands.mic_led]                  # { 0x06, 0xbf, 1..10 } + save  (LED strength)
opcode = [0xbf]
capability = "mic_led"
save = true
encoding = { type = "int_range", min = 1, max = 10 }

[commands.inactive_time]            # { 0x06, 0xc1, 0..6 } + save   (auto-off level)
opcode = [0xc1]
capability = "inactive_time"
save = true
encoding = { type = "enum", entries = [
  { value = 0, label = "never" },
  { value = 1, label = "1min" },
  { value = 2, label = "5min" },
  { value = 3, label = "10min" },
  { value = 4, label = "15min" },
  { value = 5, label = "30min" },
  { value = 6, label = "60min" },
] }

# Cross-check against the validated READ path ([0x07,0xbd] -> anc_mode):
[commands.anc]                      # { 0x06, 0xbd, 0=off|1=transparency|2=on }
opcode = [0xbd]
capability = "anc"
save = true
encoding = { type = "enum", entries = [
    { value = 0, label = "off" },
    { value = 1, label = "transparency" },
    { value = 2, label = "on" },
] }

# HIGHER RISK — NOT corroborated by HeadsetControl for this model. Authored but
# their capability must NOT be added to `capabilities` until their OWNER-RUN gate
# (Tasks 7d/7e) passes. Keep them here for the encoder; the gate flips them on.
[commands.transparency_level]       # { 0x06, 0xb9, 1..10 }
opcode = [0xb9]
capability = "anc"                  # reuses anc capability; still gated by Task 7d
save = true
encoding = { type = "int_range", min = 1, max = 10 }

[commands.mic_volume]               # { 0x06, 0x37, 1..10 }  -- ships OFF (Task 7f)
opcode = [0x37]
capability = "mic_volume"
save = true
encoding = { type = "int_range", min = 1, max = 10 }

# ChatMix hardware-dial enable. Puts the headset into game/chat dial mode so it emits
# [0x07,0x45] dial frames. Reverse-engineered from a USB capture; software mode switch,
# recoverable by replug. GATED: stays disabled (allowlist empty) until OWNER-RUN
# validation (asm-cli device chatmix-enable --validate) signs it off. save=false (one-time).
[commands.chatmix_enable]
opcode = [0x49]
capability = "chat_mix"
save = false
encoding = { type = "enum", entries = [
    { value = 0, label = "disabled" },
    { value = 1, label = "enabled" },
] }
